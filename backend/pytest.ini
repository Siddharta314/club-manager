[pytest]
DJANGO_SETTINGS_MODULE = padel.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=0
filterwarnings =
    ignore::DeprecationWarning
testpaths =
    .