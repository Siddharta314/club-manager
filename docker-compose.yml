services:
  db:
    image: postgres:16
    restart: unless-stopped
    # Credentials default to padel:padel/padel so the
    # `DATABASE_URL=postgresql://padel:padel@localhost:5433/padel` in
    # backend/.env.example works out-of-the-box on a developer laptop
    # without docker. The container's internal Postgres still listens
    # on 5432; we only shift the **host** port to 5433 so the dev
    # doesn't collide with a local Postgres install that may already
    # be running on 5432.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-padel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padel}
      POSTGRES_DB: ${POSTGRES_DB:-padel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-padel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn padel.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file:
      - ./backend/.env
    # Inside docker, override DATABASE_URL to use the in-network db host.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-padel}:${POSTGRES_PASSWORD:-padel}@db:5432/${POSTGRES_DB:-padel}
    volumes:
      - backend_media:/app/media
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  qcluster:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "manage.py", "qcluster"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-padel}:${POSTGRES_PASSWORD:-padel}@db:5432/${POSTGRES_DB:-padel}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  backend_media:
